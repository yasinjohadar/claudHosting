<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0057B8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#003F88;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E9AD0"/>
      <stop offset="100%" style="stop-color:#0057B8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0057B8;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Server rack base -->
  <g transform="translate(80, 60)" filter="url(#softShadow)">
    <!-- Rack frame -->
    <rect x="0" y="0" width="240" height="280" rx="8" fill="#1a1a2e"/>
    <rect x="4" y="4" width="232" height="272" rx="6" fill="#0d0d1a"/>
    
    <!-- Server units (6 rows) -->
    <g transform="translate(12, 16)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="216" height="38" rx="4" fill="url(#serverGrad)" opacity="0.95"/>
      <circle cx="20" cy="19" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="19" r="4" fill="#28a745"/>
      <circle cx="52" cy="19" r="4" fill="#ffc107"/>
      <rect x="68" y="14" width="140" height="10" rx="2" fill="#0057B8" opacity="0.4"/>
      
      <!-- Row 2 -->
      <rect x="0" y="46" width="216" height="38" rx="4" fill="url(#serverGrad)" opacity="0.9"/>
      <circle cx="20" cy="65" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="65" r="4" fill="#28a745"/>
      <circle cx="52" cy="65" r="4" fill="#ffc107"/>
      <rect x="68" y="60" width="120" height="10" rx="2" fill="#0057B8" opacity="0.4"/>
      
      <!-- Row 3 - highlighted -->
      <rect x="0" y="92" width="216" height="38" rx="4" fill="url(#serverGrad)"/>
      <circle cx="20" cy="111" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="111" r="4" fill="#28a745"/>
      <circle cx="52" cy="111" r="4" fill="#ffc107"/>
      <rect x="68" y="106" width="160" height="10" rx="2" fill="url(#glowGrad)"/>
      
      <!-- Row 4 -->
      <rect x="0" y="138" width="216" height="38" rx="4" fill="url(#serverGrad)" opacity="0.9"/>
      <circle cx="20" cy="157" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="157" r="4" fill="#28a745"/>
      <circle cx="52" cy="157" r="4" fill="#ffc107"/>
      <rect x="68" y="152" width="100" height="10" rx="2" fill="#0057B8" opacity="0.4"/>
      
      <!-- Row 5 -->
      <rect x="0" y="184" width="216" height="38" rx="4" fill="url(#serverGrad)" opacity="0.9"/>
      <circle cx="20" cy="203" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="203" r="4" fill="#28a745"/>
      <circle cx="52" cy="203" r="4" fill="#ffc107"/>
      <rect x="68" y="198" width="130" height="10" rx="2" fill="#0057B8" opacity="0.4"/>
      
      <!-- Row 6 -->
      <rect x="0" y="230" width="216" height="38" rx="4" fill="url(#serverGrad)" opacity="0.95"/>
      <circle cx="20" cy="249" r="4" fill="#4db8ff" filter="url(#glow)"/>
      <circle cx="36" cy="249" r="4" fill="#28a745"/>
      <circle cx="52" cy="249" r="4" fill="#ffc107"/>
      <rect x="68" y="244" width="150" height="10" rx="2" fill="#0057B8" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Cloud / network lines -->
  <g opacity="0.6">
    <path d="M50 120 Q100 80 150 100 T250 90" stroke="#0057B8" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
    <path d="M60 350 Q120 280 180 300 T340 280" stroke="#2E9AD0" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.4"/>
  </g>
  
  <!-- Floating data nodes -->
  <circle cx="320" cy="80" r="8" fill="#0057B8" opacity="0.3"/>
  <circle cx="340" cy="150" r="6" fill="#2E9AD0" opacity="0.25"/>
  <circle cx="50" cy="200" r="6" fill="#0057B8" opacity="0.25"/>
  <circle cx="30" cy="320" r="10" fill="#2E9AD0" opacity="0.2"/>
</svg>
